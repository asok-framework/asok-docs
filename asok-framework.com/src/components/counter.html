<div class="p-8 pt-12 h-full flex flex-col items-center justify-start text-left font-mono text-xs overflow-hidden">
    <div class="text-[10px] font-black uppercase tracking-widest mb-6 self-center" style="color: var(--phone-label)">
        Counter.py</div>
    <div class="w-full space-y-1">
        <div><span class="text-purple-400">class</span> <span class="text-yellow-400">Counter</span>(Component):</div>
        <div class="pl-4">count = <span class="text-orange-400">0</span></div>
        <div class="pl-4 mt-2"><span class="text-purple-400">def</span> <span
                class="text-yellow-400">increment</span>(self):</div>
        <div class="pl-8">self.count += <span class="text-orange-400">1</span></div>
    </div>

    <div class="w-full mt-10 pt-10 flex flex-col items-center gap-3"
        style="border-top: 1px dashed var(--glass-card-border)">
        <div class="w-28 h-28 rounded-full flex items-center justify-center mb-2 group-hover:scale-110 transition-transform"
            style="background: var(--phone-counter-bg)">
            <span class="text-5xl font-black tabular-nums" style="color: var(--text-primary)">{{ count }}</span>
        </div>

        <div class="w-full flex gap-2">
            <button ws-click="decrement"
                class="flex-1 py-2.5 rounded-xl font-black text-2xl transition-all cursor-pointer hover:scale-105 active:scale-95"
                style="background: rgba(239, 68, 68, 0.2); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.4);">
                −
            </button>
            <button ws-click="increment"
                class="flex-1 py-2.5 rounded-xl font-black text-2xl transition-all cursor-pointer hover:scale-105 active:scale-95"
                style="background: rgba(34, 197, 94, 0.2); color: #16a34a; border: 1px solid rgba(34, 197, 94, 0.4);">
                +
            </button>
        </div>

        <button ws-click="reset"
            class="w-full py-2.5 rounded-xl font-bold text-xs transition-all cursor-pointer hover:scale-105 active:scale-95"
            style="background: rgba(249, 115, 22, 0.15); color: var(--accent-secondary); border: 1px solid rgba(249, 115, 22, 0.3);">
            Reset
        </button>
    </div>
</div>
