{% extends "html/base.html" %}

{% block title %}Server Error | Asok Framework{% endblock %}

{% block main %}
<div class="relative min-h-[80vh] flex flex-col items-center justify-center text-center px-6 overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] blur-[120px] rounded-full -z-10"
        style="background: color-mix(in srgb, #ef4444 10%, transparent)">
    </div>

    <div class="relative z-10 space-y-8 max-w-2xl">
        <!-- Shaking Icon -->
        <div class="shake-animation mb-12">
            <div class="relative inline-block">
                <div class="absolute inset-0 blur-2xl rounded-full"
                    style="background: color-mix(in srgb, #ef4444 20%, transparent)"></div>
                <div class="relative p-8 rounded-[2.5rem] backdrop-blur-xl"
                    style="background: color-mix(in srgb, #ef4444 5%, transparent); border: 1px solid color-mix(in srgb, #ef4444 20%, transparent)">
                    <svg class="w-20 h-20" style="color: #f87171" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-8xl md:text-9xl font-black tracking-tighter error-number-red">
            500
        </h1>

        <div class="space-y-4">
            <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--text-primary)">
                Internal Server Error
            </h2>
            <p class="text-base md:text-lg max-w-md mx-auto" style="color: var(--text-secondary)">
                Something went wrong on our end. We're working to fix it. Please try again later.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center pt-8">
            <a href="/" data-block="main,title,mobile_docs_menu" data-push-url data-trigger="click"
               class="error-btn error-btn-danger">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go Home
            </a>
            <a href="https://github.com/asok-framework/asok-docs/issues/new"
               target="_blank"
               rel="noopener noreferrer"
               class="error-btn error-btn-secondary">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                Report Issue
            </a>
        </div>
    </div>
</div>
{% endblock %}
