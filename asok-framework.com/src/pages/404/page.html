{% extends "html/base.html" %}

{% block title %}Page Not Found | Asok Framework{% endblock %}

{% block main %}
<div class="relative min-h-[80vh] flex flex-col items-center justify-center text-center px-6 overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] blur-[120px] rounded-full -z-10"
        style="background: color-mix(in srgb, var(--accent-primary) 10%, transparent)">
    </div>

    <div class="relative z-10 space-y-8 max-w-2xl">
        <!-- Floating Icon -->
        <div class="float-animation mb-12">
            <div class="relative inline-block">
                <div class="absolute inset-0 blur-2xl rounded-full"
                    style="background: color-mix(in srgb, var(--accent-primary) 20%, transparent)"></div>
                <div class="relative p-8 rounded-[2.5rem] backdrop-blur-xl"
                    style="background: var(--accent-bg); border: 1px solid var(--accent-border)">
                    <svg class="w-20 h-20" style="color: var(--accent-primary)" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-8xl md:text-9xl font-black tracking-tighter error-number">
            404
        </h1>

        <div class="space-y-4">
            <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--text-primary)">
                Page Not Found
            </h2>
            <p class="text-base md:text-lg max-w-md mx-auto" style="color: var(--text-secondary)">
                The page you're looking for doesn't exist or has been moved.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center pt-8">
            <a href="/" data-block="main,title,mobile_docs_menu" data-push-url data-trigger="click"
               class="error-btn error-btn-primary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go Home
            </a>
            <a href="/docs/01-getting-started" data-block="main,title,mobile_docs_menu" data-push-url data-trigger="click"
               class="error-btn error-btn-secondary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                Documentation
            </a>
        </div>
    </div>
</div>
{% endblock %}
